# #   - No Kafka container needed
# #   - KAFKA_BROKER, KAFKA_SASL_USERNAME, KAFKA_SASL_PASSWORD set via .env
# #   - Uses SASL_PLAIN + TLS (standard Confluent Cloud connection)
# #
# # PostgreSQL: single container, 9 databases via init.sql
# # Redis: container for speech service RQ queue
# # MongoDB: Atlas (external, no change)
# # Caddy: reverse proxy, auto HTTPS
